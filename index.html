<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E0F12">
<title>Scheda Upper · Allenamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F12;
    --bg-grad:#16181D;
    --card:#1A1D24;
    --card-2:#21252E;
    --line:#2C313B;
    --ink:#F5F3EF;
    --muted:#8A909C;
    --faint:#5B616D;
    --accent:#FF5A3C;        /* azione / progresso */
    --accent-soft:#3a221c;
    --done:#3DDC97;          /* set completato */
    --done-soft:#16382c;
    --display:"Oswald","Arial Narrow",sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  body{
    font-family:var(--body);
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(120% 60% at 50% -10%, var(--bg-grad) 0%, var(--bg) 55%);
    padding-bottom:40px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg, rgba(14,15,18,.96) 70%, rgba(14,15,18,0));
    backdrop-filter:blur(8px);
    padding:18px 0 12px;
  }
  .titlebar{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .kicker{
    font-family:var(--display);
    font-weight:700;
    letter-spacing:.18em;
    font-size:11px;
    color:var(--accent);
    text-transform:uppercase;
  }
  h1{
    font-family:var(--display);
    font-weight:700;
    font-size:34px;
    line-height:.95;
    letter-spacing:.01em;
    text-transform:uppercase;
  }
  .sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.02em;}

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;gap:6px;margin-top:16px;
    background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:5px;
  }
  .tab{
    flex:1;border:none;background:transparent;color:var(--muted);
    font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:.06em;
    text-transform:uppercase;padding:11px 0;border-radius:10px;cursor:pointer;
    transition:color .18s, background .18s;
  }
  .tab.active{background:var(--accent);color:#1a0d08;}
  .tab .muscles{display:block;font-family:var(--body);font-weight:500;font-size:9.5px;letter-spacing:.04em;margin-top:2px;opacity:.75;}

  /* ---------- Progress ---------- */
  .progress{
    margin-top:14px;display:flex;align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 16px;
  }
  .pct{font-family:var(--display);font-weight:700;font-size:40px;line-height:.8;min-width:78px;}
  .pct span{font-size:16px;color:var(--muted);}
  .bar-col{flex:1;}
  .bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.03em;}
  .bar{height:8px;background:#0a0b0e;border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#ff8a5c);border-radius:99px;transition:width .35s cubic-bezier(.2,.8,.2,1);}
  .bar-fill.complete{background:linear-gradient(90deg,var(--done),#7df0bf);}

  /* ---------- Exercise cards ---------- */
  .list{margin-top:16px;display:flex;flex-direction:column;gap:11px;}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:15px 16px 16px;position:relative;overflow:hidden;
    transition:border-color .2s, background .2s;
  }
  .card.done{border-color:var(--done-soft);background:linear-gradient(180deg,var(--card),#181e1b);}
  .card .idx{
    position:absolute;top:12px;right:14px;
    font-family:var(--display);font-weight:700;font-size:13px;color:var(--faint);
    letter-spacing:.05em;
  }
  .ex-muscle{font-family:var(--display);font-weight:600;font-size:10.5px;letter-spacing:.16em;color:var(--accent);text-transform:uppercase;}
  .card.done .ex-muscle{color:var(--done);}
  .ex-name{font-family:var(--display);font-weight:600;font-size:21px;line-height:1.04;margin-top:3px;text-transform:uppercase;letter-spacing:.005em;padding-right:24px;}
  .ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
  .chip{
    font-size:11.5px;color:var(--muted);background:var(--card-2);
    border:1px solid var(--line);border-radius:8px;padding:4px 9px;letter-spacing:.02em;
  }
  .chip b{color:var(--ink);font-weight:600;}

  /* dots + timer row */
  .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;}
  .dots{display:flex;gap:9px;}
  .dot{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--faint);background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s, border-color .18s, background .18s;
    font-family:var(--display);font-weight:700;font-size:12px;color:var(--faint);
  }
  .dot.on{background:var(--done);border-color:var(--done);color:#08130d;}
  .dot:active{transform:scale(.86);}

  .rest-btn{
    border:1px solid var(--line);background:var(--card-2);color:var(--ink);
    border-radius:11px;padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;
    font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:.04em;white-space:nowrap;
    transition:background .18s,border-color .18s;
  }
  .rest-btn:active{background:var(--accent-soft);border-color:var(--accent);}
  .rest-btn svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2.4;}

  /* ---------- Footer actions ---------- */
  .foot{margin-top:20px;display:flex;gap:10px;}
  .btn-ghost{
    flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);
    border-radius:12px;padding:13px;font-family:var(--display);font-weight:600;
    font-size:14px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:color .18s,border-color .18s;
  }
  .btn-ghost:active{color:var(--accent);border-color:var(--accent);}
  .note{margin-top:18px;font-size:11.5px;color:var(--faint);line-height:1.55;text-align:center;letter-spacing:.01em;}

  /* ---------- Rest timer overlay ---------- */
  .overlay{
    position:fixed;inset:0;z-index:60;display:none;
    background:rgba(8,9,11,.92);backdrop-filter:blur(10px);
    flex-direction:column;align-items:center;justify-content:center;padding:24px;
  }
  .overlay.show{display:flex;}
  .ov-label{font-family:var(--display);font-weight:600;letter-spacing:.2em;font-size:13px;color:var(--accent);text-transform:uppercase;}
  .ov-time{font-family:var(--display);font-weight:700;font-size:118px;line-height:.9;letter-spacing:.02em;margin:10px 0 4px;font-variant-numeric:tabular-nums;}
  .ov-time.zero{color:var(--done);}
  .ov-ex{font-size:13px;color:var(--muted);margin-bottom:34px;text-align:center;}
  .ring{margin-bottom:30px;}
  .ring circle{fill:none;stroke-width:6;}
  .ring .track{stroke:#1c1f26;}
  .ring .prog{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear;transform:rotate(-90deg);transform-origin:center;}
  .ov-row{display:flex;gap:12px;align-items:center;}
  .ov-adj{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    width:64px;height:54px;border-radius:13px;cursor:pointer;
    font-family:var(--display);font-weight:600;font-size:16px;
  }
  .ov-adj:active{border-color:var(--accent);}
  .ov-skip{
    border:none;background:var(--accent);color:#1a0d08;
    padding:0 30px;height:54px;border-radius:13px;cursor:pointer;
    font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.08em;text-transform:uppercase;
  }
  .ov-skip:active{filter:brightness(1.08);}

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;}
  }
  @media (max-width:380px){
    .ov-time{font-size:96px;}
    h1{font-size:30px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="titlebar">
      <div>
        <div class="kicker">Ipertrofia · Casa · Manubri</div>
        <h1>Scheda Upper</h1>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-day="A">Upper A<span class="muscles">Petto · Braccia</span></button>
      <button class="tab" data-day="B">Upper B<span class="muscles">Schiena · Spalle · Braccia</span></button>
    </div>
    <div class="progress">
      <div class="pct" id="pct">0<span>%</span></div>
      <div class="bar-col">
        <div class="bar-label"><span id="setsLabel">0 / 0 serie</span><span id="dayLabel">Upper A</span></div>
        <div class="bar"><div class="bar-fill" id="barFill"></div></div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="list" id="list"></div>

  <div class="foot">
    <button class="btn-ghost" id="resetDay">Azzera giorno</button>
  </div>

  <p class="note">
    Composti: recupero 2-3 min · Isolamenti: 60-90 sec.<br>
    Porta a cedimento gli esercizi leggeri (croci, laterali, curl). I progressi si salvano da soli.
  </p>
</main>

<!-- Rest timer overlay -->
<div class="overlay" id="overlay">
  <div class="ov-label">Recupero</div>
  <div class="ov-time" id="ovTime">2:00</div>
  <div class="ov-ex" id="ovEx"></div>
  <svg class="ring" width="92" height="92" viewBox="0 0 92 92">
    <circle class="track" cx="46" cy="46" r="42"></circle>
    <circle class="prog" id="ovRing" cx="46" cy="46" r="42"></circle>
  </svg>
  <div class="ov-row">
    <button class="ov-adj" id="ovMinus">−15</button>
    <button class="ov-skip" id="ovSkip">Salta</button>
    <button class="ov-adj" id="ovPlus">+15</button>
  </div>
</div>

<script>
const DATA = {
  A: [
    {m:"Petto",      n:"Push-up su manubri ROM massimo", sets:4, rep:"8-15",  kg:"Corpo libero",   rest:120},
    {m:"Petto",      n:"Floor press",                    sets:4, rep:"8-12",  kg:"8-10 kg/mano",   rest:120},
    {m:"Petto",      n:"Croci a terra",                  sets:3, rep:"12-20", kg:"6-8 kg/mano",    rest:90},
    {m:"Schiena",    n:"Rematore unilaterale",           sets:4, rep:"10-15", kg:"15-20 kg singolo",rest:120},
    {m:"Spalle",     n:"Lean-in lateral raise",          sets:4, rep:"12-20", kg:"4-6 kg/mano",    rest:90},
    {m:"Bicipiti",   n:"Curl in piedi alternato",        sets:3, rep:"8-12",  kg:"8-10 kg/mano",   rest:90},
    {m:"Tricipiti",  n:"Overhead triceps extension",     sets:3, rep:"10-15", kg:"10-15 kg singolo",rest:90},
  ],
  B: [
    {m:"Schiena",    n:"Rematore pesante unilaterale",   sets:4, rep:"8-12",  kg:"20 kg singolo",  rest:120},
    {m:"Dorsali",    n:"Pullover a terra",               sets:3, rep:"12-20", kg:"10-15 kg singolo",rest:90},
    {m:"Spalle",     n:"Shoulder press seduto/in piedi", sets:4, rep:"8-12",  kg:"8-10 kg/mano",   rest:120},
    {m:"Petto",      n:"Push-up / floor press",          sets:3, rep:"8-12",  kg:"Corpo lib. / 8-10",rest:120},
    {m:"Petto",      n:"Croci a terra",                  sets:2, rep:"12-20", kg:"6-8 kg/mano",    rest:90},
    {m:"Spalle",     n:"Lean-in lateral raise",          sets:3, rep:"12-20", kg:"4-6 kg/mano",    rest:90},
    {m:"Spalle post.",n:"Bent-over reverse fly",         sets:3, rep:"15-20", kg:"4-6 kg/mano",    rest:90},
    {m:"Bicipiti",   n:"Hammer curl",                    sets:3, rep:"10-15", kg:"8-10 kg/mano",   rest:90},
  ]
};

/* ---- persistence (graceful fallback) ---- */
const KEY = "scheda_upper_v1";
let mem = {};
function loadState(){
  try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  return mem.state || {A:{}, B:{}};
}
function saveState(s){
  mem.state = s;
  try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){}
}
let state = loadState();
let day = "A";

/* ---- render ---- */
const listEl = document.getElementById('list');
function render(){
  const ex = DATA[day];
  listEl.innerHTML = "";
  ex.forEach((e, i)=>{
    const doneSets = (state[day][i]||0);
    const isDone = doneSets >= e.sets;
    const card = document.createElement('div');
    card.className = "card" + (isDone ? " done" : "");
    let dots = "";
    for(let s=0;s<e.sets;s++){
      dots += `<button class="dot ${s<doneSets?'on':''}" data-ex="${i}" data-set="${s}">${s<doneSets?'✓':s+1}</button>`;
    }
    card.innerHTML = `
      <div class="idx">${String(i+1).padStart(2,'0')}</div>
      <div class="ex-muscle">${e.m}</div>
      <div class="ex-name">${e.n}</div>
      <div class="ex-meta">
        <span class="chip"><b>${e.sets}×${e.rep}</b></span>
        <span class="chip">${e.kg}</span>
      </div>
      <div class="controls">
        <div class="dots">${dots}</div>
        <button class="rest-btn" data-rest="${e.rest}" data-name="${e.n}">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>
          ${fmt(e.rest)}
        </button>
      </div>`;
    listEl.appendChild(card);
  });
  updateProgress();
}

function fmt(s){ const m=Math.floor(s/60), x=s%60; return m+":"+String(x).padStart(2,'0'); }

function updateProgress(){
  const ex = DATA[day];
  let total=0, done=0;
  ex.forEach((e,i)=>{ total+=e.sets; done+=Math.min(state[day][i]||0, e.sets); });
  const pct = total? Math.round(done/total*100):0;
  document.getElementById('pct').innerHTML = pct+'<span>%</span>';
  document.getElementById('setsLabel').textContent = done+" / "+total+" serie";
  document.getElementById('dayLabel').textContent = "Upper "+day;
  const fill = document.getElementById('barFill');
  fill.style.width = pct+"%";
  fill.classList.toggle('complete', pct===100);
}

/* ---- interactions ---- */
listEl.addEventListener('click', (ev)=>{
  const dot = ev.target.closest('.dot');
  if(dot){
    const i = +dot.dataset.ex, s = +dot.dataset.set;
    const cur = state[day][i]||0;
    // tap a filled-or-next dot: if tapping the highest filled, unfill it; else fill up to this
    state[day][i] = (s+1===cur) ? s : s+1;
    saveState(state); render();
    return;
  }
  const rb = ev.target.closest('.rest-btn');
  if(rb){ startRest(+rb.dataset.rest, rb.dataset.name); }
});

document.getElementById('tabs').addEventListener('click',(ev)=>{
  const t = ev.target.closest('.tab'); if(!t) return;
  day = t.dataset.day;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x===t));
  render();
});

document.getElementById('resetDay').addEventListener('click',()=>{
  state[day] = {}; saveState(state); render();
});

/* ---- rest timer ---- */
const overlay=document.getElementById('overlay');
const ovTime=document.getElementById('ovTime');
const ovEx=document.getElementById('ovEx');
const ovRing=document.getElementById('ovRing');
const R=42, C=2*Math.PI*R;
ovRing.style.strokeDasharray=C;
let remaining=0, totalRest=0, timerId=null, audioCtx=null;

function startRest(sec, name){
  remaining=sec; totalRest=sec;
  ovEx.textContent=name;
  overlay.classList.add('show');
  paintTimer();
  clearInterval(timerId);
  timerId=setInterval(tick,1000);
}
function paintTimer(){
  ovTime.textContent=fmt(Math.max(remaining,0));
  const frac = totalRest? remaining/totalRest : 0;
  ovRing.style.strokeDashoffset = C*(1-frac);
  ovTime.classList.toggle('zero', remaining<=0);
}
function tick(){
  remaining--;
  paintTimer();
  if(remaining<=0){ clearInterval(timerId); beep(); setTimeout(closeRest, 1100); }
}
function closeRest(){ overlay.classList.remove('show'); clearInterval(timerId); }
function beep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    [0,160,320].forEach(d=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.frequency.value=880; o.type="sine";
      o.connect(g); g.connect(audioCtx.destination);
      const t=audioCtx.currentTime + d/1000;
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(.4,t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+.16);
      o.start(t); o.stop(t+.18);
    });
  }catch(e){}
}
document.getElementById('ovMinus').onclick=()=>{ remaining=Math.max(0,remaining-15); totalRest=Math.max(totalRest,remaining); paintTimer(); };
document.getElementById('ovPlus').onclick =()=>{ remaining+=15; totalRest=Math.max(totalRest,remaining); paintTimer(); };
document.getElementById('ovSkip').onclick =closeRest;

if(!state.A) state.A={}; if(!state.B) state.B={};
render();
</script>
</body>
</html>
